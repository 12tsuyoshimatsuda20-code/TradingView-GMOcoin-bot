version: "3.9"
services:
  exec-lane:
    build:
      context: ./exec-lane
      dockerfile: Dockerfile
    image: exec-lane:1.0.0
    container_name: exec-lane
    env_file:
      - ./config/.env
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./kuma-data:/app/data
    depends_on:
      exec-lane:
        condition: service_healthy
