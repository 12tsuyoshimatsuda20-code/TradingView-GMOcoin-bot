version: "3.9"

services:
  web:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "${PORT:-8000}"]
    # To expose via Cloudflare Tunnel:
    # cloudflared tunnel --url http://web:8000 --hostname your-domain.example
