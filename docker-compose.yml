version: "3.9"

services:
  exec-lane:
    container_name: exec-lane
    build: ./exec-lane
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./config/.env
    environment:
      - ENV=production
      - TZ=Asia/Tokyo
    volumes:
      - ./config/.env:/app/config/.env:ro
      - ./logs:/logs
      - ./runtime:/runtime
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
