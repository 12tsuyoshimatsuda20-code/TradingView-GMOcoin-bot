services:
  exec-lane:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./config/.env
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
