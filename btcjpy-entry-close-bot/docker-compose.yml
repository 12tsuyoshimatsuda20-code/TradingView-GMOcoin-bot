services:
  exec-lane:
    build:
      context: ./exec-lane
    container_name: btcjpy-entry-close-bot
    env_file:
      - ./config/.env
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
